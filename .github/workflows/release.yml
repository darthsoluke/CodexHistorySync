name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: codex-history-sync_linux_amd64
          - goos: linux
            goarch: arm64
            binary_name: codex-history-sync_linux_arm64
          - goos: darwin
            goarch: amd64
            binary_name: codex-history-sync_darwin_amd64
          - goos: darwin
            goarch: arm64
            binary_name: codex-history-sync_darwin_arm64
          - goos: windows
            goarch: amd64
            binary_name: codex-history-sync_windows_amd64.exe
          - goos: windows
            goarch: arm64
            binary_name: codex-history-sync_windows_arm64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS='${{ matrix.goos }}' GOARCH='${{ matrix.goarch }}' \
            go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.binary_name }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: dist/${{ matrix.binary_name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -name 'codex-history-sync*' -exec cp {} release/ \;

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          find . -maxdepth 1 -type f -name 'codex-history-sync*' | sort | xargs sha256sum > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
